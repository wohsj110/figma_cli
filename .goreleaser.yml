version: 2

before:
  hooks:
    - go test ./...

builds:
  - id: figma-cli
    main: ./cmd/figma-cli
    binary: figma-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: figma-cli
    ids:
      - figma-cli
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "figma-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - README.zh-CN.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  replace_existing_artifacts: true

homebrew_casks:
  - name: figma-cli
    ids:
      - figma-cli
    skip_upload: false
    url:
      template: "https://github.com/wohsj110/figma_cli/releases/download/v{{ .Version }}/{{ .ArtifactName }}"
    repository:
      owner: wohsj110
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/wohsj110/figma_cli
    description: "Agent-friendly Figma REST API command-line toolkit"
    binaries:
      - figma-cli
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/figma-cli"]
    caveats: |
      figma-cli has been installed.

      To configure, store your Figma personal access token in the OS keyring:
        printf %s "$FIGMA_TOKEN" | figma-cli init --token-stdin

      Create a token at: https://www.figma.com/developers/api#access-tokens
